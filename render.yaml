services:
  - type: web
    name: rams-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn -w 4 -k gthread run:app"
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: DATABASE_URL
        fromDatabase:
          name: rams-pg
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: rams-redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://project-management-system-seven-mu.vercel.app

  - type: worker
    name: rams-celery
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A celery_worker.celery worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rams-pg
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: rams-redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          type: web
          name: rams-backend
          envVarKey: SECRET_KEY

  - type: redis
    name: rams-redis
    region: ohio
    plan: free
    ipAllowList: []

databases:
  - name: rams-pg
    plan: free
    databaseName: rams
    user: rams_admin
    region: ohio
