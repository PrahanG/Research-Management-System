services:
  - type: web
    name: rams-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && flask db upgrade"
    startCommand: "gunicorn -w 4 -k gthread run:app"
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: DATABASE_URL
        fromDatabase:
          name: rams-pg
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://project-management-system-mu-self.vercel.app

databases:
  - name: rams-pg
    plan: free
    databaseName: rams
    user: rams_admin
    region: ohio
